<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Types Of Leaves</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
    padding:20px;
}

.container{
    max-width:400px;
    margin:auto;
}

/* Heading */
.page-title{
    text-align:center;
    font-size:30px;
    color:#0d47a1;
    margin-bottom:25px;
    font-weight:bold;
}

/* Card */
.card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.12);
    margin-bottom:25px;
    transition:0.3s ease;
}

.card:hover{
    transform:translateY(-5px);
}

/* Image Container */
.image-box{
    width:100%;
    height:250px;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:10px;
}

.image-box img{
    max-width:100%;
    max-height:100%;
    width:auto;
    height:auto;
    object-fit:contain;
    display:block;
}

.content{
    padding:18px;
}

.content h2{
    color:#222;
    margin-bottom:10px;
    font-size:22px;
}

.content p{
    color:#555;
    line-height:1.6;
    font-size:15px;
}

/* Link Button */
.link{
    display:block;
    text-align:center;
    text-decoration:none;
    background:#0d6efd;
    color:#fff;
    padding:14px;
    font-size:17px;
    font-weight:bold;
    transition:0.3s;
}

.link:hover{
    background:#084ec2;
}

/* Mobile */
@media (max-width:480px){

.page-title{
    font-size:26px;
}

.image-box{
    height:200px;
}

.content h2{
    font-size:20px;
}

.link{
    font-size:16px;
}
}
</style>

</head>
<body>

<div class="container">

    <h1 class="page-title">Types Of Leaves</h1>

    <!-- Card 1 -->
    <div class="card">

        <div class="image-box">
            <img src="https://lizzieharper.co.uk/wp-content/uploads/2013/03/Diagram-of-a-linear-leaf.jpg" alt="Linear Leaf">
        </div>

        <div class="content">
            <h2>Linear</h2>

            <p>
                Long and narrow with parallel sides; width remains almost uniform throughout the leaf.
            </p>
        </div>

        <a href="linearexamples.html" class="link">
            Examples →
        </a>

    </div>

    <!-- Card 2 -->
    <div class="card">

        <div class="image-box">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS1-AFfNHIV0ELQneS4wDOgbj6Zq9yt4bAWmg&s" alt="Cordate Leaf">
        </div>

        <div class="content">
            <h2>Cordate (Heart-shaped)</h2>

            <p>
                Heart-shaped with a deep notch at the base where the petiole attaches.
            </p>
        </div>

        <a href="cordateexamples.html" class="link">
            Examples →
        </a>

    </div>

</div>

</body>
</html>
